services:
  pool-proxy:
    build: .
    image: grokbuild2api:latest
    container_name: grokbuild2api
    restart: unless-stopped
    ports:
      - "18080:18080"
    environment:
      # 必改：管理台密钥
      ADMIN_KEY: "${ADMIN_KEY:-}"
      # 可选：静态客户端 API Key；为空则依赖管理台发放的 sk- 令牌
      API_KEY: "${API_KEY:-}"
      # true=内置 mock 上游；接真实 Grok 时改为 false 并设置 UPSTREAM_BASE_URL
      MOCK_UPSTREAM: "${MOCK_UPSTREAM:-true}"
      UPSTREAM_BASE_URL: "${UPSTREAM_BASE_URL:-}"
      LISTEN: "0.0.0.0:18080"
      ALLOW_PUBLIC_LISTEN: "true"
      HOT_SIZE: "${HOT_SIZE:-3000}"
      MAX_CONCURRENT: "${MAX_CONCURRENT:-120}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - pool-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18080/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  pool-data:
